<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories 💖</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:radial-gradient(circle,#12001f,#000);
font-family:Arial;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

/* SCENE */
.scene{
width:100vw;
height:100vh;
perspective:1200px;
overflow:hidden;
}

/* DOME */
.dome{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
cursor:grab;
}

/* PHOTO */
.photo{
position:absolute;
width:140px;
height:140px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px #ff1493;
transition:0.3s;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.photo:hover{
transform:scale(1.2);
box-shadow:0 0 40px #ff69b4;
}

/* LETTER */
.letter{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px #ff1493;
}

.letter h2{
margin-top:0;
color:#ff69b4;
}

.letter p{
font-size:14px;
line-height:1.6;
}

</style>
</head>

<body>

<div class="scene">
<div class="dome" id="dome"></div>

<div class="letter">
<h2>Untuk Kamu 💌</h2>
<p>
Aku cuma mau bilang makasih karena kamu selalu ada.
Dari semua hal yang terjadi,
kamu tetap jadi orang yang paling berarti.
Semoga semua kenangan kita
bisa terus berputar seperti galeri ini. 💖
</p>
</div>

</div>

<script>

const dome = document.getElementById("dome");

/* FOTO LIST */
const photos=[
"foto1.jpg",
"foto2.jpg",
"foto3.jpg",
"foto4.jpg",
"foto5.jpg",
"foto6.jpg",
"foto7.jpg",
"foto8.jpg",
"foto9.jpg",
"foto10.jpg"
];

/* CREATE DOME */
const radius=500;

photos.forEach((src,i)=>{

const angle=(i/photos.length)*Math.PI*2;

const x=Math.cos(angle)*radius;
const z=Math.sin(angle)*radius;

const photo=document.createElement("div");
photo.className="photo";

photo.style.transform=
`translate3d(${x}px,${Math.random()*200-100}px,${z}px)`;

photo.innerHTML=`<img src="${src}">`;

dome.appendChild(photo);

});

/* ROTATION */

let isDown=false;
let startX;
let startY;
let rotX=0;
let rotY=0;

/* MOUSE */

document.addEventListener("mousedown",(e)=>{
isDown=true;
startX=e.clientX;
startY=e.clientY;
});

document.addEventListener("mouseup",()=>isDown=false);

document.addEventListener("mousemove",(e)=>{

if(!isDown)return;

rotY+=(e.clientX-startX)*0.3;
rotX-=(e.clientY-startY)*0.2;

dome.style.transform=
`rotateX(${rotX}deg) rotateY(${rotY}deg)`;

startX=e.clientX;
startY=e.clientY;

});

/* TOUCH */

document.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

document.addEventListener("touchmove",(e)=>{

let x=e.touches[0].clientX;
let y=e.touches[0].clientY;

rotY+=(x-startX)*0.3;
rotX-=(y-startY)*0.2;

dome.style.transform=
`rotateX(${rotX}deg) rotateY(${rotY}deg)`;

startX=x;
startY=y;

});

</script>

</body>
</html>
