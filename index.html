<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Mode</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#2b0036,#000);
color:white;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff2e63;
color:white;
cursor:pointer;
}

.hidden{
display:none;
}

#timer{
font-size:25px;
margin-top:20px;
}

img{
width:200px;
border-radius:20px;
margin:10px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
}
</style>
</head>

<body>

<div id="start">
<h1>❤️ Love Mode</h1>
<button onclick="startLove()">Start</button>
</div>

<div id="quiz" class="hidden">
<h2>Pertanyaan ❤️</h2>

<p>Siapa yang paling ganteng?</p>
<button onclick="next()">Kamu</button>
<button onclick="next()">Tetap kamu</button>

</div>

<div id="loveMeter" class="hidden">
<h2>Cinta Kita Hehehe ❤️</h2>
<p id="meter">0%</p>
</div>

<div id="tree" class="hidden">
<h2>Pohon Cinta 🌳</h2>

<div id="timer"></div>

<p>
Sejak 25 Oktober 2024 kita bersama ❤️  
Semoga terus sampai tua nanti.
</p>

</div>

<div id="gallery" class="hidden">

<h2>Kenangan Kita 📸</h2>

<div class="gallery">

<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">
<img src="https://picsum.photos/300?4">

</div>

</div>

<script>

function startLove(){
document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
}

function next(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("loveMeter").classList.remove("hidden");

let percent=0;

let interval=setInterval(()=>{
percent++;

document.getElementById("meter").innerText=percent+"%";

if(percent==100){
clearInterval(interval);

document.getElementById("loveMeter").classList.add("hidden");
document.getElementById("tree").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("gallery").classList.remove("hidden");
},4000);

}

},40)

}

const startDate=new Date("2024-10-25");

function updateTimer(){

const now=new Date();

const diff=now-startDate;

const days=Math.floor(diff/(1000*60*60*24));

const hours=Math.floor((diff/(1000*60*60))%24);

const minutes=Math.floor((diff/(1000*60))%60);

const seconds=Math.floor((diff/1000)%60);

document.getElementById("timer").innerHTML=

days+" hari "+
hours+" jam "+
minutes+" menit "+
seconds+" detik";

}

setInterval(updateTimer,1000);

</script>

</body>
</html>
