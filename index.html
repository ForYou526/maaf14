<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<style>
body{
margin:0;
font-family:'Comic Sans MS', cursive;
text-align:center;
overflow:hidden;
background:linear-gradient(to bottom,#ffdde1,#ee9ca7);
}

/* BACKGROUND FLOWER */
.bgFlower{
position:fixed;
font-size:30px;
animation:fall 10s linear infinite;
opacity:0.8;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* GLOW LIGHT */
.light{
position:fixed;
width:200px;
height:200px;
background:radial-gradient(circle, rgba(255,255,255,0.6), transparent);
border-radius:50%;
animation:moveLight 8s infinite alternate;
}

@keyframes moveLight{
0%{top:10%;left:10%;}
100%{top:60%;left:70%;}
}

/* FIREWORK */
.firework{
position:fixed;
font-size:25px;
animation:boom 1.5s ease-out forwards;
}

@keyframes boom{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(2);opacity:0;}
}

/* NAME SKY */
.nameSky{
position:fixed;
top:15%;
width:100%;
font-size:40px;
color:white;
text-shadow:0 0 20px pink,0 0 40px hotpink;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px pink;}
to{text-shadow:0 0 30px hotpink;}
}

/* ENVELOPE */
.container{padding-top:120px;position:relative;z-index:2;}

.envelope{
width:220px;
height:140px;
background:#ff6fa5;
margin:auto;
position:relative;
border-radius:10px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.flap{
width:220px;
height:110px;
background:#ff8fc4;
position:absolute;
top:0;
left:0;
transform-origin:top;
transition:transform 1s ease;
border-radius:10px 10px 0 0;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

.paper{
width:360px;
min-height:300px;
margin:20px auto;
padding:30px;
border-radius:10px;
display:none;
background:white;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.yes{background:#ff4b8b;color:white;}
#noBtn{background:white;color:#ff4b8b;position:absolute;}

/* LOVE GIFT */
.loveGift{
font-size:90px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.2);}
}

/* PHOTO */
.photo{
width:250px;
border-radius:20px;
box-shadow:0 0 40px hotpink;
animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.5);}
to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<div class="nameSky">✨ NAMANYA ✨</div>

<div class="light"></div>

<div class="container">

<h2>Hai Sayangku 🥺💖</h2>

<div class="envelope" id="envelope" onclick="openEnvelope()">
<div class="flap"></div>
</div>

<div class="paper" id="paper">
<p id="text"></p>

<div id="buttons" style="display:none;">
<h3>Maafin aku yaa? 🥺</h3>
<button class="yes" onclick="forgive()">Iyaaa 🤍</button>
<button id="noBtn" onmouseover="moveNo()">Gamau 😝</button>
</div>
</div>

</div>

<script>

/* FLOWER BACKGROUND */
for(let i=0;i<40;i++){
let flower=document.createElement("div");
flower.className="bgFlower";
flower.innerHTML=["🌸","🌺","🌷","🌹"][Math.floor(Math.random()*4)];
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(Math.random()*10+5)+"s";
document.body.appendChild(flower);
}

/* FIREWORK LOOP */
setInterval(()=>{
let fw=document.createElement("div");
fw.className="firework";
fw.innerHTML="✨";
fw.style.left=Math.random()*100+"vw";
fw.style.top=Math.random()*50+"vh";
document.body.appendChild(fw);
setTimeout(()=>fw.remove(),1500);
},1000);

/* OPEN ENVELOPE */
function openEnvelope(){
let env=document.getElementById("envelope");
env.classList.add("open");
setTimeout(()=>{
env.style.display="none";
let paper=document.getElementById("paper");
paper.style.display="block";
typeEffect();
},1000);
}

/* TYPE EFFECT */
let message="Sayang... aku minta maaf yaa 🥺 Kalau aku bikin kamu sedih itu bukan niat aku. Kamu itu berharga banget buat aku 🤍";

let i=0;
function typeEffect(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typeEffect,35);
}else{
document.getElementById("buttons").style.display="block";
}
}

function moveNo(){
let btn=document.getElementById("noBtn");
btn.style.top=Math.random()*70+"%";
btn.style.left=Math.random()*70+"%";
}

/* AFTER YES */
function forgive(){
document.body.style.background="black";
document.getElementById("paper").innerHTML=
"<h2 style='color:white;'>Makasih ya sayangkuu 🥺💖</h2>"+
"<div class='loveGift' onclick='explodeLove()'>❤️</div>";
}

/* LOVE EXPLODE */
function explodeLove(){
let paper=document.getElementById("paper");
paper.innerHTML="<h2 style='color:white;'>💥 BOOM 💥</h2>";
setTimeout(()=>{
paper.innerHTML=
"<h2 style='color:white;'>I LOVE YOUUUU 💖</h2>"+
"<img src='foto.jpg' class='photo'>";
},1000);
}

</script>

</body>
</html>
