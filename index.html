<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Valentine ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#1a0025,#000);
color:white;
overflow:hidden;
}

/* PAGE */

.page{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.active{display:flex}

/* LOVE MODE */

.switch{
width:90px;
height:44px;
background:#555;
border-radius:40px;
position:relative;
cursor:pointer;
}

.circle{
width:36px;
height:36px;
background:white;
border-radius:50%;
position:absolute;
top:4px;
left:4px;
transition:.4s;
}

.switch.active{
background:#ff2e75;
box-shadow:0 0 20px #ff2e75;
}

.switch.active .circle{
left:50px;
}

/* BUTTON */

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff2e75;
color:white;
font-size:18px;
margin:10px;
cursor:pointer;
box-shadow:0 0 15px #ff2e75;
}

/* TIC TAC TOE */

.grid{
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
}

.cell{
width:80px;
height:80px;
background:#222;
font-size:40px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

/* METER */

.meter{
width:200px;
height:200px;
border-radius:50%;
border:10px solid rgba(255,255,255,.1);
position:relative;
}

.meterFill{
position:absolute;
width:200px;
height:200px;
border-radius:50%;
border:10px solid #ff2e75;
clip-path:polygon(0 0,100% 0,100% 100%,0 100%);
transform:rotate(0deg);
}

.percent{
font-size:40px;
margin-top:20px;
}

/* TREE */

#tree{
font-size:120px;
opacity:0;
transform:scale(0);
transition:1.5s;
}

#tree.show{
opacity:1;
transform:scale(1);
}

/* TIMER */

.timer{
font-size:22px;
margin-top:10px;
}

/* TYPEWRITER */

#message{
width:400px;
line-height:1.6;
}

/* DOME */

.scene{
width:100vw;
height:100vh;
perspective:1200px;
}

.dome{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
cursor:grab;
}

.photo{
position:absolute;
width:140px;
height:140px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px #ff2e75;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="pretty.mp3">
</audio>

<!-- LOVE MODE -->

<div class="page active" id="p1">

<h1>Love Mode</h1>

<div class="switch" onclick="loveMode(this)">
<div class="circle"></div>
</div>

</div>

<!-- TIC TAC TOE -->

<div class="page" id="p2">

<h2>Main dulu 😆</h2>

<div class="grid" id="grid"></div>

</div>

<!-- LOVE METER -->

<div class="page" id="p3">

<h2>Cinta Kita ❤️</h2>

<div class="meter">
<div class="meterFill" id="meterFill"></div>
</div>

<div class="percent" id="percent">0%</div>

</div>

<!-- TREE -->

<div class="page" id="p4">

<h2>Pohon Cinta</h2>

<div id="tree">🌳</div>

<div class="timer" id="timer"></div>

<button onclick="nextPage(5)">Lanjut</button>

</div>

<!-- MESSAGE -->

<div class="page" id="p5">

<h2>Untuk Kamu</h2>

<div id="message"></div>

<button onclick="nextPage(6)">Kenangan Kita</button>

</div>

<!-- DOME -->

<div class="page" id="p6">

<div class="scene">
<div class="dome" id="dome"></div>
</div>

</div>

<script>

/* PAGE */

function nextPage(n){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById("p"+n).classList.add("active")

}

/* LOVE MODE */

function loveMode(el){

el.classList.add("active")

setTimeout(()=>{

nextPage(2)

startGame()

},800)

}

/* TIC TAC TOE */

function startGame(){

const grid=document.getElementById("grid")

for(let i=0;i<9;i++){

let cell=document.createElement("div")

cell.className="cell"

cell.onclick=()=>{

cell.innerHTML="X"

setTimeout(()=>{

nextPage(3)

startMeter()

},500)

}

grid.appendChild(cell)

}

}

/* LOVE METER */

function startMeter(){

let p=0

let interval=setInterval(()=>{

p++

document.getElementById("percent").innerText=p+"%"

document.getElementById("meterFill").style.transform="rotate("+(p*1.8)+"deg)"

if(p>=100){

clearInterval(interval)

nextPage(4)

document.getElementById("tree").classList.add("show")

}

},40)

}

/* TIMER */

const startDate=new Date("2024-10-25")

setInterval(()=>{

const now=new Date()

const diff=now-startDate

const d=Math.floor(diff/86400000)
const h=Math.floor(diff/3600000)%24
const m=Math.floor(diff/60000)%60
const s=Math.floor(diff/1000)%60

document.getElementById("timer").innerText=

d+" hari "+h+" jam "+m+" menit "+s+" detik"

},1000)

/* TYPEWRITER */

const text="Aku bersyukur banget bisa kenal kamu. Kamu adalah orang paling berarti buat aku ❤️"

let i=0

function typeWriter(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i)

i++

setTimeout(typeWriter,40)

}

}

typeWriter()

/* DOME */

const dome=document.getElementById("dome")

const photos=[

"1.jpeg","2.jpeg","3.jpeg","4.jpeg","5.jpeg",
"6.jpeg","7.jpeg","8.jpeg","9.jpeg","10.jpeg"

]

const radius=500

photos.forEach((src,i)=>{

const angle=(i/photos.length)*Math.PI*2

const x=Math.cos(angle)*radius
const z=Math.sin(angle)*radius

const photo=document.createElement("div")

photo.className="photo"

photo.style.transform=`translate3d(${x}px,0,${z}px)`

photo.innerHTML=`<img src="${src}">`

dome.appendChild(photo)

})

/* ROTATE */

let isDown=false
let startX
let startY
let rotX=0
let rotY=0

document.addEventListener("mousedown",e=>{
isDown=true
startX=e.clientX
startY=e.clientY
})

document.addEventListener("mouseup",()=>isDown=false)

document.addEventListener("mousemove",e=>{

if(!isDown)return

rotY+=(e.clientX-startX)*0.3
rotX-=(e.clientY-startY)*0.2

dome.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`

startX=e.clientX
startY=e.clientY

})

</script>

</body>
</html>
