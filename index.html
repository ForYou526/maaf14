<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Love</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at center,#14001f,#000);
color:white;
overflow:hidden;
}

/* PAGE */

.page{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.active{
display:flex;
}

/* LOVE MODE */

.switch{
width:90px;
height:44px;
background:#555;
border-radius:40px;
position:relative;
cursor:pointer;
transition:.4s;
}

.circle{
width:36px;
height:36px;
background:white;
border-radius:50%;
position:absolute;
top:4px;
left:4px;
transition:.4s;
}

.switch.active{
background:#ff2e75;
box-shadow:0 0 20px #ff2e75;
}

.switch.active .circle{
left:50px;
}

/* QUIZ */

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff2e75;
color:white;
font-size:18px;
margin:10px;
cursor:pointer;
box-shadow:0 0 15px #ff2e75;
}

/* TREE */

#treeContainer{
position:relative;
width:300px;
height:400px;
}

.heartBase{
font-size:60px;
}

.tree{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%) scale(0);
width:20px;
height:200px;
background:#4b2a1f;
border-radius:10px;
transition:2s;
}

.tree.show{
transform:translateX(-50%) scale(1);
}

.branch{
position:absolute;
width:120px;
height:6px;
background:#4b2a1f;
top:60px;
left:-50px;
transform:rotate(30deg);
}

.branch2{
position:absolute;
width:120px;
height:6px;
background:#4b2a1f;
top:100px;
left:-50px;
transform:rotate(-30deg);
}

/* HEART LEAVES */

.leaf{
position:absolute;
color:#ff2e75;
font-size:18px;
animation:fall 6s linear infinite;
}

@keyframes fall{

0%{transform:translateY(0);opacity:1;}

100%{transform:translateY(400px);opacity:0;}

}

/* TIMER */

.timer{
font-size:22px;
margin-top:15px;
}

/* TYPE MESSAGE */

#message{
width:400px;
font-size:18px;
line-height:1.6;
}

/* DOME */

.scene{
width:100vw;
height:100vh;
perspective:1200px;
}

.dome{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
cursor:grab;
}

.photo{
position:absolute;
width:140px;
height:140px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px #ff2e75;
transition:.3s;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.photo:hover{
transform:scale(1.2);
}

</style>
</head>

<body>

<!-- LOVE MODE -->

<div class="page active" id="p1">

<h1>Love Mode</h1>

<div class="switch" onclick="loveMode(this)">
<div class="circle"></div>
</div>

<p>Turn on love mode ❤️</p>

</div>

<!-- QUIZ -->

<div class="page" id="p2">

<h2>Pertanyaan Buat Kamu 💖</h2>

<div id="quizBox"></div>

</div>

<!-- TREE -->

<div class="page" id="p3">

<h2>Pohon Cinta 🌸</h2>

<div id="treeContainer">

<div class="heartBase">❤️</div>

<div class="tree" id="tree">

<div class="branch"></div>
<div class="branch2"></div>

</div>

</div>

<div class="timer" id="timer"></div>

<button onclick="nextPage(4)">Lanjut</button>

</div>

<!-- MESSAGE -->

<div class="page" id="p4">

<h2>Untuk Kamu 💌</h2>

<div id="message"></div>

<button onclick="nextPage(5)">Lihat Kenangan</button>

</div>

<!-- DOME -->

<div class="page" id="p5">

<div class="scene">
<div class="dome" id="dome"></div>
</div>

</div>

<script>

/* PAGE */

function nextPage(n){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById("p"+n).classList.add("active")

}

/* LOVE MODE */

function loveMode(el){

el.classList.add("active")

setTimeout(()=>{

nextPage(2)

startQuiz()

},700)

}

/* QUIZ */

const questions=[

"Siapa yang paling ganteng?",
"Siapa yang paling sayang kamu?",
"Kita bakal lama gak?",
"Kalau aku kangen kamu gimana?",
"Aku bikin kamu bahagia gak?",
"Kita cocok gak?",
"Kamu cinta aku?",
"Kita bakal sampai tua kan?"

]

let q=0

function startQuiz(){
showQuestion()
}

function showQuestion(){

if(q>=questions.length){

nextPage(3)

setTimeout(()=>{
document.getElementById("tree").classList.add("show")
spawnLeaves()
},500)

return
}

document.getElementById("quizBox").innerHTML=

"<p>"+questions[q]+"</p>"+
"<button onclick='nextQ()'>Iya</button>"+
"<button onclick='nextQ()'>Banget</button>"

}

function nextQ(){

q++

showQuestion()

}

/* LEAVES */

function spawnLeaves(){

setInterval(()=>{

const leaf=document.createElement("div")

leaf.className="leaf"

leaf.innerHTML="❤️"

leaf.style.left=Math.random()*300+"px"

document.getElementById("treeContainer").appendChild(leaf)

setTimeout(()=>leaf.remove(),6000)

},600)

}

/* TIMER */

const startDate=new Date("2024-10-25")

setInterval(()=>{

const now=new Date()

const diff=now-startDate

const d=Math.floor(diff/86400000)
const h=Math.floor(diff/3600000)%24
const m=Math.floor(diff/60000)%60
const s=Math.floor(diff/1000)%60

document.getElementById("timer").innerText=

d+" hari "+h+" jam "+m+" menit "+s+" detik"

},1000)

/* TYPEWRITER */

const text="Aku bersyukur banget bisa kenal kamu. Kamu adalah orang yang paling berarti buat aku. Semoga kita bisa terus bersama sampai tua nanti ❤️"

let i=0

function typeWriter(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i)

i++

setTimeout(typeWriter,40)

}

}

typeWriter()

/* DOME */

const dome=document.getElementById("dome")

const photos=[

"1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg",
"9.jpg","10.jpg","11.jpg","12.jpg","13.jpg","14.jpg","15.jpg"

]

const radius=600

photos.forEach((src,i)=>{

const angle=(i/photos.length)*Math.PI*2

const x=Math.cos(angle)*radius
const z=Math.sin(angle)*radius

const photo=document.createElement("div")

photo.className="photo"

photo.style.transform=

`translate3d(${x}px,${Math.random()*200-100}px,${z}px)`

photo.innerHTML=`<img src="${src}">`

photo.onclick=()=>alert("Kenangan Kita ❤️")

dome.appendChild(photo)

})

/* ROTATE */

let isDown=false
let startX
let startY
let rotX=0
let rotY=0

document.addEventListener("mousedown",e=>{
isDown=true
startX=e.clientX
startY=e.clientY
})

document.addEventListener("mouseup",()=>isDown=false)

document.addEventListener("mousemove",e=>{

if(!isDown)return

rotY+=(e.clientX-startX)*0.3
rotX-=(e.clientY-startY)*0.2

dome.style.transform=

`rotateX(${rotX}deg) rotateY(${rotY}deg)`

startX=e.clientX
startY=e.clientY

})

</script>

</body>
</html>
