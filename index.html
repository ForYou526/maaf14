<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#2a0033,#000);
color:white;
overflow:hidden;
}

/* PAGE */

.page{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.active{
display:flex;
}

/* LOVE MODE */

.switch{
width:80px;
height:40px;
background:#333;
border-radius:40px;
position:relative;
cursor:pointer;
}

.circle{
width:34px;
height:34px;
background:white;
border-radius:50%;
position:absolute;
top:3px;
left:3px;
transition:0.4s;
}

.switch.active{
background:#ff2d75;
}

.switch.active .circle{
left:43px;
}

/* QUIZ */

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff2d75;
color:white;
font-size:18px;
margin:8px;
cursor:pointer;
box-shadow:0 0 15px #ff2d75;
}

/* LOVE METER */

.meter{
width:220px;
height:220px;
border-radius:50%;
border:12px solid rgba(255,255,255,0.1);
position:relative;
}

.meterFill{
position:absolute;
width:220px;
height:220px;
border-radius:50%;
border:12px solid #ff2d75;
clip-path:polygon(0 0,100% 0,100% 100%,0 100%);
transform:rotate(0deg);
}

.percent{
font-size:40px;
margin-top:20px;
}

/* TREE */

#tree{
font-size:140px;
opacity:0;
transform:scale(0);
transition:1.5s;
}

#tree.show{
opacity:1;
transform:scale(1);
}

.timer{
font-size:22px;
margin-top:10px;
}

/* TYPEWRITER */

#message{
width:400px;
line-height:1.6;
font-size:18px;
}

/* DOME */

.scene{
width:100vw;
height:100vh;
perspective:1200px;
}

.dome{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
cursor:grab;
}

.photo{
position:absolute;
width:160px;
height:160px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px #ff2d75;
transition:0.3s;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

.photo:hover{
transform:scale(1.2);
}

</style>
</head>

<body>

<!-- PAGE 1 LOVE MODE -->

<div class="page active" id="p1">

<h1>Love Mode</h1>

<div class="switch" onclick="loveMode(this)">
<div class="circle"></div>
</div>

<p>Turn on love mode ❤️</p>

</div>

<!-- PAGE 2 QUIZ -->

<div class="page" id="p2">

<h2>Pertanyaan Cinta 💖</h2>

<div id="quizBox"></div>

</div>

<!-- PAGE 3 LOVE METER -->

<div class="page" id="p3">

<h2>Cinta Kita Hehe ❤️</h2>

<div class="meter">
<div class="meterFill" id="meterFill"></div>
</div>

<div class="percent" id="percent">0%</div>

</div>

<!-- PAGE 4 TREE -->

<div class="page" id="p4">

<h2>Pohon Cinta 🌸</h2>

<div id="tree">🌳</div>

<div class="timer" id="timer"></div>

<p>Kita sudah bersama sejak 25 Oktober 2024 ❤️</p>

<button onclick="nextPage(5)">Lanjut</button>

</div>

<!-- PAGE 5 TYPEWRITER -->

<div class="page" id="p5">

<h2>Untuk Kamu 💌</h2>

<div id="message"></div>

<button onclick="nextPage(6)">Lihat Kenangan</button>

</div>

<!-- PAGE 6 DOME -->

<div class="page" id="p6">

<div class="scene">
<div class="dome" id="dome"></div>
</div>

</div>

<script>

/* PAGE CONTROL */

function nextPage(n){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById("p"+n).classList.add("active")

}

/* LOVE MODE */

function loveMode(el){

el.classList.add("active")

setTimeout(()=>{

nextPage(2)

startQuiz()

},800)

}

/* QUIZ */

const questions=[

"Siapa yang paling ganteng?",
"Siapa yang paling sayang kamu?",
"Kita bakal lama gak?",
"Kalau aku kangen kamu gimana?",
"Kalau kita nikah nanti mau punya berapa anak?"
]

let q=0

function startQuiz(){
showQuestion()
}

function showQuestion(){

if(q>=questions.length){
nextPage(3)
startMeter()
return
}

document.getElementById("quizBox").innerHTML=

"<p>"+questions[q]+"</p>"+
"<button onclick='nextQ()'>Kamu</button>"+
"<button onclick='nextQ()'>Tetap Kamu</button>"

}

function nextQ(){
q++
showQuestion()
}

/* LOVE METER */

function startMeter(){

let p=0

let interval=setInterval(()=>{

p++

document.getElementById("percent").innerText=p+"%"

document.getElementById("meterFill").style.transform="rotate("+(p*1.8)+"deg)"

if(p>=100){

clearInterval(interval)

setTimeout(()=>{

nextPage(4)

document.getElementById("tree").classList.add("show")

},800)

}

},30)

}

/* TIMER */

const startDate=new Date("2024-10-25")

setInterval(()=>{

const now=new Date()

const diff=now-startDate

const d=Math.floor(diff/86400000)
const h=Math.floor(diff/3600000)%24
const m=Math.floor(diff/60000)%60
const s=Math.floor(diff/1000)%60

document.getElementById("timer").innerText=

d+" hari "+h+" jam "+m+" menit "+s+" detik"

},1000)

/* TYPEWRITER */

const text=

"Aku bersyukur banget bisa kenal kamu. "+
"Dari semua orang di dunia ini, "+
"kamu adalah orang yang paling berarti buat aku. "+
"Semoga kita bisa terus bersama sampai tua nanti. ❤️"

let i=0

function typeWriter(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i)

i++

setTimeout(typeWriter,40)

}

}

typeWriter()

/* DOME GALLERY */

const dome=document.getElementById("dome")

const photos=[

"1.jpg",
"2.jpg",
"3.jpg",
"4.jpg",
"5.jpg",
"6.jpg",
"7.jpg",
"8.jpg",
"9.jpg",
"10.jpg"

]

const radius=500

photos.forEach((src,i)=>{

const angle=(i/photos.length)*Math.PI*2

const x=Math.cos(angle)*radius
const z=Math.sin(angle)*radius

const photo=document.createElement("div")
photo.className="photo"

photo.style.transform=

`translate3d(${x}px,${Math.random()*200-100}px,${z}px)`

photo.innerHTML=`<img src="${src}">`

photo.onclick=()=>alert("Kenangan Kita ❤️")

dome.appendChild(photo)

})

/* ROTATION */

let isDown=false
let startX
let startY
let rotX=0
let rotY=0

document.addEventListener("mousedown",e=>{
isDown=true
startX=e.clientX
startY=e.clientY
})

document.addEventListener("mouseup",()=>isDown=false)

document.addEventListener("mousemove",e=>{

if(!isDown)return

rotY+=(e.clientX-startX)*0.3
rotX-=(e.clientY-startY)*0.2

dome.style.transform=

`rotateX(${rotX}deg) rotateY(${rotY}deg)`

startX=e.clientX
startY=e.clientY

})

document.addEventListener("touchmove",e=>{

let x=e.touches[0].clientX
let y=e.touches[0].clientY

rotY+=(x-startX)*0.3
rotX-=(y-startY)*0.2

dome.style.transform=

`rotateX(${rotX}deg) rotateY(${rotY}deg)`

startX=x
startY=y

})

</script>

</body>
</html>
