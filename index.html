<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu 💖</title>

<style>

body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#1a002a,#000);
color:white;
text-align:center;
overflow:hidden;
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* BUTTON */

.btn{
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff2d75;
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff2d75;
}

/* LOVE MODE CARD */

.card{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,0,100,0.5);
}

/* QUIZ */

.quiz button{
margin:10px;
}

/* LOVE METER */

.meter{
width:200px;
height:200px;
border-radius:50%;
border:10px solid rgba(255,255,255,0.1);
position:relative;
}

.meterFill{
position:absolute;
width:200px;
height:200px;
border-radius:50%;
border:10px solid #ff2d75;
clip-path:polygon(0 0,100% 0,100% 100%,0 100%);
transform:rotate(0deg);
}

.percent{
font-size:40px;
margin-top:20px;
}

/* LOVE TREE */

#tree{
font-size:120px;
}

.timer{
font-size:20px;
margin-top:10px;
}

/* DOME */

.scene{
width:100vw;
height:100vh;
perspective:1200px;
overflow:hidden;
}

.dome{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
cursor:grab;
}

.photo{
position:absolute;
width:150px;
height:150px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px #ff2d75;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<div class="card">
<h2>Love Mode 💖</h2>
<button class="btn" onclick="nextPage(2)">ON</button>
</div>
</div>

<!-- PAGE 2 QUIZ -->
<div class="page" id="page2">

<h2>Pertanyaan buat kamu 😆</h2>

<div class="quiz">

<p>Aku ganteng gak?</p>
<button onclick="quiz()">Banget</button>
<button onclick="quiz()">Ganteng banget</button>

<p>Aku sayang kamu gak?</p>
<button onclick="quiz()">Iya</button>
<button onclick="quiz()">Banget</button>

<p>Kamu sayang aku?</p>
<button onclick="quiz()">Sayang</button>
<button onclick="quiz()">Sayang banget</button>

</div>

</div>

<!-- PAGE 3 LOVE METER -->
<div class="page" id="page3">

<h2>Cinta Kita Hehe ❤️</h2>

<div class="meter">
<div class="meterFill" id="meterFill"></div>
</div>

<div class="percent" id="percent">0%</div>

</div>

<!-- PAGE 4 TREE -->
<div class="page" id="page4">

<h2>Pohon Cinta 🌸</h2>

<div id="tree">🌳</div>

<div class="timer" id="timer"></div>

<p>
Sejak hari itu aku sadar,  
kamu bukan cuma seseorang.  
kamu adalah rumah. 💖
</p>

<button class="btn" onclick="nextPage(5)">Lihat Kenangan</button>

</div>

<!-- PAGE 5 DOME -->
<div class="page" id="page5">

<div class="scene">
<div class="dome" id="dome"></div>
</div>

</div>

<script>

/* PAGE CONTROL */

function nextPage(n){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById("page"+n).classList.add("active")

if(n==3){
startMeter()
}

}

/* QUIZ */

let quizCount=0

function quiz(){

quizCount++

if(quizCount>=3){
nextPage(3)
}

}

/* LOVE METER */

function startMeter(){

let percent=0

let interval=setInterval(()=>{

percent++

document.getElementById("percent").innerText=percent+"%"

document.getElementById("meterFill").style.transform=
"rotate("+(percent*1.8)+"deg)"

if(percent>=100){
clearInterval(interval)
setTimeout(()=>{
nextPage(4)
},1000)
}

},40)

}

/* TIMER RELATIONSHIP */

const startDate=new Date("2024-10-25")

function updateTimer(){

const now=new Date()

const diff=now-startDate

const sec=Math.floor(diff/1000)%60
const min=Math.floor(diff/60000)%60
const hr=Math.floor(diff/3600000)%24
const day=Math.floor(diff/86400000)

document.getElementById("timer").innerText=

day+" hari "+
hr+" jam "+
min+" menit "+
sec+" detik"

}

setInterval(updateTimer,1000)

/* DOME GALLERY */

const dome=document.getElementById("dome")

const photos=[
"foto1.jpg",
"foto2.jpg",
"foto3.jpg",
"foto4.jpg",
"foto5.jpg",
"foto6.jpg",
"foto7.jpg",
"foto8.jpg"
]

const radius=500

photos.forEach((src,i)=>{

const angle=(i/photos.length)*Math.PI*2

const x=Math.cos(angle)*radius
const z=Math.sin(angle)*radius

const photo=document.createElement("div")
photo.className="photo"

photo.style.transform=
`translate3d(${x}px,${Math.random()*200-100}px,${z}px)`

photo.innerHTML=`<img src="${src}">`

dome.appendChild(photo)

})

/* ROTATE */

let isDown=false
let startX
let startY
let rotX=0
let rotY=0

document.addEventListener("mousedown",e=>{
isDown=true
startX=e.clientX
startY=e.clientY
})

document.addEventListener("mouseup",()=>isDown=false)

document.addEventListener("mousemove",e=>{

if(!isDown)return

rotY+=(e.clientX-startX)*0.3
rotX-=(e.clientY-startY)*0.2

dome.style.transform=
`rotateX(${rotX}deg) rotateY(${rotY}deg)`

startX=e.clientX
startY=e.clientY

})

document.addEventListener("touchmove",e=>{

let x=e.touches[0].clientX
let y=e.touches[0].clientY

rotY+=(x-startX)*0.3
rotX-=(y-startY)*0.2

dome.style.transform=
`rotateX(${rotX}deg) rotateY(${rotY}deg)`

startX=x
startY=y

})

</script>

</body>
</html>
