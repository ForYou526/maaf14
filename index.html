<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💐</title>

<style>
body{
margin:0;
font-family:'Comic Sans MS', cursive;
text-align:center;
overflow:hidden;
transition:2s;
background:#ffe6f2;
}

/* BACKGROUND FLOWERS */
.bgFlower{
position:fixed;
font-size:40px;
opacity:0.7;
animation:floatBg 6s ease-in-out infinite alternate;
filter:drop-shadow(0 0 10px hotpink);
}

@keyframes floatBg{
from{transform:translateY(0);}
to{transform:translateY(-20px);}
}

body.dark{
background:radial-gradient(circle at center,#0f0f1a,#000);
}

/* FLOWER FALL */
.fall{
position:fixed;
top:-50px;
font-size:25px;
animation:falling linear infinite;
opacity:0.8;
}

@keyframes falling{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* ENVELOPE */
.container{padding-top:80px;position:relative;z-index:2;}

.envelope{
width:220px;
height:140px;
background:#ff6fa5;
margin:auto;
position:relative;
border-radius:10px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.flap{
width:220px;
height:110px;
background:#ff8fc4;
position:absolute;
top:0;
left:0;
transform-origin:top;
transition:transform 1s ease;
border-radius:10px 10px 0 0;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

/* PAPER */
.paper{
width:360px;
min-height:300px;
margin:20px auto;
padding:30px 30px 30px 50px;
border-radius:10px;
display:none;
color:#5e2a84;
transform:scale(0.6);
opacity:0;
transition:1s;
text-align:left;
line-height:30px;
font-size:18px;
background:repeating-linear-gradient(
to bottom,
white 0px,
white 29px,
#b79ad8 30px
);
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.paper.show{
transform:scale(1);
opacity:1;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.yes{background:#ff4b8b;color:white;}
#noBtn{background:white;color:#ff4b8b;position:absolute;}

/* BIG BOUQUET SIDE */
.bouquet{
position:fixed;
bottom:0;
font-size:90px;
animation:floatFlower 4s ease-in-out infinite;
filter:drop-shadow(0 0 25px hotpink);
}

.leftBouquet{left:2%;}
.rightBouquet{right:2%;}

@keyframes floatFlower{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

/* PHOTO */
.photo{
width:220px;
border-radius:20px;
margin-top:20px;
animation:pulse 2s infinite;
box-shadow:0 0 30px hotpink;
display:block;
margin-left:auto;
margin-right:auto;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

/* GLOW NAME */
.glowName{
font-size:26px;
color:white;
text-align:center;
margin-top:20px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px hotpink;}
to{text-shadow:0 0 30px deeppink;}
}

footer{
position:fixed;
bottom:10px;
width:100%;
font-size:14px;
color:#ff4b8b;
}
</style>
</head>

<body>

<div class="container">

<h2>Hai Sayangku 🥺💖</h2>

<div class="envelope" id="envelope" onclick="openEnvelope()">
<div class="flap"></div>
</div>

<div class="paper" id="paper">
<p id="text"></p>

<div id="buttons" style="display:none; text-align:center;">
<h3>Maafin aku yaa? 🥺</h3>
<button class="yes" onclick="forgive()">Iyaaa 🤍</button>
<button id="noBtn" onmouseover="moveNo()">Gamau 😝</button>
</div>
</div>

</div>

<footer>
Powered by Raihan Nadir Widodo 💕
</footer>

<script>

/* MANY BACKGROUND FLOWERS */
for(let i=0;i<50;i++){
let flower=document.createElement("div");
flower.classList.add("bgFlower");
flower.innerHTML=["🌸","🌺","🌷","🌹"][Math.floor(Math.random()*4)];
flower.style.left=Math.random()*100+"vw";
flower.style.top=Math.random()*100+"vh";
flower.style.animationDuration=(Math.random()*4+3)+"s";
document.body.appendChild(flower);
}

/* OPEN */
function openEnvelope(){
let env=document.getElementById("envelope");
env.classList.add("open");
setTimeout(()=>{
env.style.display="none";
let paper=document.getElementById("paper");
paper.style.display="block";
setTimeout(()=>{paper.classList.add("show");},100);
typeEffect();
},1000);
}

/* TYPE */
let message="Sayang... aku minta maaf yaa 🥺 Kalau aku bikin kamu sedih atau kesel itu bukan niat aku. Aku cuma lagi belajar jadi yang terbaik buat kamu. Kamu itu penting banget buat aku 🤍";

let i=0;

function typeEffect(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typeEffect,35);
}else{
document.getElementById("buttons").style.display="block";
}
}

function moveNo(){
let btn=document.getElementById("noBtn");
btn.style.top=Math.random()*70+"%";
btn.style.left=Math.random()*70+"%";
}

/* AFTER FORGIVE */
function forgive(){
document.body.classList.add("dark");

/* flower falling */
for(let i=0;i<25;i++){
let fall=document.createElement("div");
fall.className="fall";
fall.innerHTML=["🌸","🌺","🌷","🌹"][Math.floor(Math.random()*4)];
fall.style.left=Math.random()*100+"vw";
fall.style.animationDuration=(Math.random()*5+5)+"s";
document.body.appendChild(fall);
}

document.getElementById("paper").innerHTML=
"<div class='glowName'>NAMA DIA 💖</div>"+
"<h2 style='text-align:center;color:white;'>Makasih ya sayangkuu udah maapin aku 🥺💖<br>Nihh aku punya sesuatu buat kamu 💐</h2>"+
"<img src='FOTO-KAMU.jpg' class='photo'>";

/* BIG BOUQUET */
let left=document.createElement("div");
left.className="bouquet leftBouquet";
left.innerHTML="💐💐🌹🌹🌷";
document.body.appendChild(left);

let right=document.createElement("div");
right.className="bouquet rightBouquet";
right.innerHTML="🌸🌸💐🌺🌹";
document.body.appendChild(right);
}

</script>

</body>
</html>
